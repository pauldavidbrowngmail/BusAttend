<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BusAttend - Business School Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
      #reader__scan_region video { border-radius: 1rem; }

      @keyframes subtle-flash {
        0%   { background-color: rgba(16, 185, 129, 0.4); }
        30%  { background-color: rgba(16, 185, 129, 1); }
        100% { background-color: rgba(16, 185, 129, 0.95); }
      }
      .animate-success-flash { animation: subtle-flash 0.6s ease-out forwards; }

      @keyframes text-pop {
        0%   { transform: scale(0.95); opacity: 0; }
        50%  { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      .animate-text-pop { animation: text-pop 0.4s ease-out forwards; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
